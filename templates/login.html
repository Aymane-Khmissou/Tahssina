{% extends "base.html" %}
{% block title %}Sign In — Tahssina{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><div class="logo" style="justify-content:center">Tahssina <span class="logo-accent arabic">تحسينة</span></div></div>
    <h2 style="text-align:center;margin-bottom:24px;font-size:1.3rem">Welcome back</h2>
    <form method="post" action="{{ url_for('login') }}" class="stack stack-md">
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input id="email" name="email" type="email" class="form-control" placeholder="you@example.com" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input id="password" name="password" type="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>
    <p style="text-align:center;margin-top:20px;font-size:.85rem;color:var(--text-muted)">
      No account? <a href="{{ url_for('register') }}">Register</a>
    </p>
  </div>
</div>
{% endblock %}
