services:
  - type: web
    name: tahssina
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --config gunicorn.conf.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: SECRET_KEY
        generateValue: true
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ""          # ← fill in your Gmail
      - key: SMTP_PASS
        value: ""          # ← fill in your Gmail App Password
      - key: EMAIL_FROM
        value: ""          # ← fill in your Gmail
